#Database
datasource.host=postgres-installationpermitmgt-stage.service.us-east4-npe.consul
maxSize=2
initialSize=1
maxIdleTime=600000
maxCreateConnectionTime=5000
maxAcquireTime=2000
maxLifeTime=3600000

#SecretFileLocation
file.location.secrets=/etc/config/secrets.json
#file.location.secrets=secrets-permits.json
# HTTP Connection Timeout in Milliseconds
http.connection.timeout=60000
#Metrics
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=*
management.metrics.enabled=true
management.prometheus.metrics.export.enabled=true
management.metrics.export.server.port=8080
management.metrics.distribution.percentiles.all=0.5,0.75,0.95
spring.application.name=permit-data-management
# Mongo
spring.mongodb.database=permits
spring.data.mongodb.connection.pool.initialSize=1
spring.data.mongodb.connection.pool.maxSize=5
spring.data.mongodb.connection.pool.maxIdleTime=5
spring.data.mongodb.connection.pool.timeout=5000
spring.data.mongodb.connection.pool.life.time=30
spring.data.mongodb.connection.pool.idle.time=5
spring.data.mongodb.trust.store.path=/etc/config/truststore-mongo.jks
cors.allowed-origins=*
common.utility.api.host.url=https://internal-sadc-dev.carbon.lowes.com/services-common-utility
common.utility.bifrost.items.url = https://internal-sadc-dev.carbon.lowes.com/job-management-utility-service/utils/bifrost/items
